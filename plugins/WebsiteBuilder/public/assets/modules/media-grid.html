<!DOCTYPE HTML>
<html>
<head>
    <meta charset="utf-8">
    <title></title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <style>
        html { height:100%; }
        body { margin:20px;height:100%;overflow:hidden;font-family:system-ui,sans-serif;font-size:14px;font-weight:200;     
          line-height:1.7; 
          opacity: 0;
          overflow:hidden;
        }
        @media all and (max-width: 800px) {
            body {margin: 0 20px 20px;overflow: unset;}
            #divCaption {
                height: 100% !important;
                top: 0 !important;
            }
        }
        @media all and (max-height: 636px) {
            body {margin: 0 20px 20px;overflow: unset;}
            #divCaption {
                height: 100% !important;
                top: 0 !important;
            }
        }
        #imageList {
            display:inline-block;box-sizing:border-box;width:100%;margin: 0;margin-top:10px;
            overflow-y:auto;overflow-x:hidden;height:330px;padding:10px;line-height:1.5;
            border:rgba(127, 127, 127, 0.32) 1px solid; border-radius:5px;
            position: relative;
        }
        #imageList > div {position:relative;margin:15px;cursor:pointer;
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #imageList div button {
            position:absolute;top:-4px;right:-4px;cursor:pointer;
            background:rgba(34, 34, 34, 0.18);
            color: #fff;
            width:28px;height:28px;text-align: center;line-height: 28px;font-size:12px;
            display: none;
        }    
        #imageList div button svg { flex: none; width:18px;height: 18px;}
        #imageList div.active button {
            display: flex;
        }
        #imageList div img {height:100px;opacity: 0.9;}
        #imageList .viditem {width:80px;height:80px;}
        input[type=text], textarea {
            width:100%;
            border-radius: 2px;
            height: 40px;
            font-size: 14px;
            box-sizing: border-box;
            margin: 0;
            font-family: sans-serif;
            letter-spacing: 1px;
            padding: 5px;
            border:none;
        }
        textarea {height:30%;} 
        textarea:focus, input:focus, select:focus {outline:none;}
        #divCaption label {margin:5px 0 5px;display: block;} 
        #divCaption {
            transition: all ease 0.3s;
            position: fixed;width:400px;height: calc(100% - 20px);top:20px;right:-400px;padding:20px;box-sizing:border-box;
            z-index:1000;
            border: rgba(127, 127, 127, 0.32) 1px solid;
        }
        @media all and (max-width: 800px) {
            #divCaption {width:300px;}
        }
        #divCaption:focus {
            outline: none;
        }
        #divCaption .btn-caption-close {
            border:none;
            position: absolute;
            top: 0; right:0;
            background: transparent;
            width:28px;height:28px;
            box-shadow: none;
        }
        #divCaption .btn-caption-close svg {
            flex: none;
        }
        /* img.selected {outline:#00da89 1px solid}
        .dark img.selected {outline:#9e9132 2px solid}*/
        .info {
            font-size: 15px;
            opacity: 0.8;
            position: fixed !important;
            top: -4px;
            left: 9px;
            margin: 8px 12px !important;
            pointer-events: none;
            display: block !important;
        }
        
        select {
            font-size: 13px;
            letter-spacing: 1px;
            height: 35px;
            line-height: 1.7;
            border-radius: 4px;
            border: none;
            width: auto; 
            display: inline-block;
            background-image: none;
            -webkit-appearance: menulist;
            -moz-appearance: menulist;
            appearance: menulist;
            padding: 0 5px;
        }

        #inpGap {
            height: 35px;
        }
        
        button {
            width: auto;
            height: 36px;
            line-height: 1;    
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            box-sizing: border-box;
            margin: 0;
            padding: 0 15px;
            border: none;
            cursor: pointer;
            font-family: sans-serif;
            letter-spacing: 1px;
            font-size: 11px;
            font-weight: 300;
            text-transform: uppercase;
            text-align: center;
            position: relative;
            border-radius: 2px;
            box-shadow: 0px 3px 6px -6px rgb(0 0 0 / 32%);  
        }
        button span {
            margin-left: 8px;
            font-size: 11px;
        }
        svg {
            overflow: hidden;
            vertical-align: middle;
            pointer-events: none;
        }
        .is-icon-flex {
            width: 16px;
            height: 16px;
        }
        .flex {
            display: flex;
        }
        
        #divVidOpts > div {
            display: flex;
            align-items: center;
            /* justify-content: space-between; */
            padding: 0 0 5px;
        }
        #divVidOpts > div button {
            background-color: transparent;
            box-shadow: none;
        }

        #btnArrowColor, #btnDotsColor {
            background-color: transparent;
        }
        
        .is-btn-color {
            border: rgba(200,200,200,0.5) 1px solid !important;
        }

        /* #imageList > div span {
          display: none
        } */

        /* Uploader */
        .file-uploader {
            position: relative;
        }

        .file-uploader.dragover {
            outline: #3e94f7 2px dashed !important;
            border: transparent 1px solid !important;
        }

        .upload-progress {
            height: 2px;
            appearance: none;
            background-color: #ddd;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .upload-progress::-webkit-progress-bar {
            background-color: #eee;
        }

        .upload-progress::-webkit-progress-value {
            background-color: #3e94f7;
        }        
    </style>
</head>

    <script>

        // -----
        var jsonVidOpts = [];
        // -----

        var activeModule = parent.contentbox.doc.querySelector('[data-module-active]'); //get active module 

        String.prototype.trimEllip = function (length) {
            return this.length > length ? this.substring(0, length) + "..." : this;
        }
        var docReady = function (fn) {
            var stateCheck = setInterval(function () {
                if (document.readyState !== "complete") return;
                clearInterval(stateCheck);
                fn();
                // try { fn() } catch (e) { }
            }, 1);
        };
        docReady(function () {

            var builder = parent.contentbox || parent._cb || parent.pagestudioai;

            const onUpload = async (file) => {
                return new Promise((resolve, reject) => {
                    if(builder.editor) { //contentbox
                        builder.editor.onAssetUpload = (url) => {
                            resolve({
                                url: url,
                                name: file.name,
                                size: file.size
                            });
                        };
                    } else {
                        builder.onAssetUpload = (url) => {
                            resolve({
                                url: url,
                                name: file.name,
                                size: file.size
                            });
                        };
                    }
                    const fakeEvent = {
                        target: {
                            files: [file]
                        }
                    };
                    builder.onMediaUpload(fakeEvent);
                });
            };
            
            if(builder.onMediaUpload) {
                document.querySelector('.drop-files-info').style.display = '';
                new FileUploader({
                    element: document.getElementById('imageList'),
                    uploadUrl: builder.uploadFileUrl, //'/upload',
                    onUpload: onUpload, //builder.onUpload,
                    headers: builder.headers || {},
                    allowedExtensions: ['jpg', 'png', 'jpeg', 'gif', 'webp', 'mp4'],
                    maxFileSize: 100 * 1024 * 1024, // 100 MB
                    onUploadSuccess(response) {
                        // console.log("Upload success:", response);
                    },
                    onUploadError(error) {
                        console.error("Upload error:", error);
                    },
                    onFileUploaded(file, response) {
                        // console.log('File uploaded:', file.name);
                        // console.log('Server URL:', response.url); // e.g. 'uploads/example.jpg'
                        addMedia(response.url, file.name);
                    },
                });
            }

            document.addEventListener('click', function(e){
                e = e || window.event;
                var target = e.target || e.srcElement;  

                if(target.closest('#divCaption')) return;
                
                if(document.activeElement) if(document.activeElement.closest('#divCaption')) return;

                closeCaptionPanel();
            });

            document.addEventListener('keydown', function(e){
                if(e.keyCode === 27) { // escape key
                    const divCaption = document.querySelector('#divCaption');
                    if(divCaption.style.right==='0px') {
                        closeCaptionPanel();
                    } else {
                        const modal = parent.document.querySelector('.is-modal.editmodule');
                        removeClass(modal, 'active');
                    }
                }
            });

            // Optional: Validate URL to prevent javascript: or invalid protocols
            function isSafeUrl(url) {
                if (!url) return true;
                try {
                    const u = new URL(url, location.origin);
                    return ['http:', 'https:', 'data:', 'blob:'].includes(u.protocol);
                } catch {
                    return false;
                }
            }

            var s = '';
            var items = activeModule.querySelectorAll('.gallery-item');

            items.forEach(item => {
                let img = item.querySelector('img');
                let video = item.querySelector('video');
                let src, title = '', desc = '', alt = '', largerUrl = '', filename = '';

                if (img) {
                    src = img.getAttribute('src');
                    if (src.indexOf('data:') !== -1 && img.getAttribute('data-src')) {
                    src = img.getAttribute('data-src');
                    }

                    const elmTitle = item.querySelector('[data-title]');
                    if (elmTitle) title = elmTitle.getAttribute('data-title') || '';

                    const elmDesc = item.querySelector('[data-description]');
                    if (elmDesc) desc = elmDesc.getAttribute('data-description') || '';

                    alt = img.getAttribute('alt') || '';

                    const linkLarger = item.querySelector('a');
                    if (linkLarger) largerUrl = linkLarger.getAttribute('href') || '';
                    if (largerUrl === src) largerUrl = '';

                } else if (video) {
                    const source = video.querySelector('source');
                    src = source ? source.getAttribute('src') : '';

                    title = video.getAttribute('data-title') || '';
                    desc  = video.getAttribute('data-description') || '';

                    const linkLarger = item.querySelector('a');
                    if (linkLarger) largerUrl = linkLarger.getAttribute('href') || '';
                    if (largerUrl === src) largerUrl = '';
                }

                // Normalize source (remove #t=0.01 etc.)
                src = src ? src.split('#')[0] : '';

                // Extract filename safely
                filename = src ? src.substring(src.lastIndexOf('/') + 1) : '';

                if (src.includes('base64')) {
                    if (img && img.getAttribute('data-filename')) filename = img.getAttribute('data-filename');
                    if (video && video.getAttribute('data-filename')) filename = video.getAttribute('data-filename');
                }

                // Escape all text for safe HTML injection
                const safeTitle     = escapeHtml(title);
                const safeDesc      = escapeHtml(desc);
                const safeAlt       = escapeHtml(alt);
                const safeFilename  = escapeHtml(filename);
                const safeLargerUrl = isSafeUrl(largerUrl) ? largerUrl : '';

                const thumbName = safeFilename.trimEllip ? safeFilename.trimEllip(15) : safeFilename;

                if (img) {
                    s += `<div title="${safeFilename}" role="button" tabindex="0"
                            data-title="${safeTitle}" data-desc="${safeDesc}" data-alt="${safeAlt}" data-larger-url="${safeLargerUrl}">
                            <img src="${src}" data-filename="${safeFilename}" />
                            <span>${thumbName}</span>
                            <button title="Remove" data-lang-title>
                            <svg class="is-icon-flex"><use xlink:href="#icon-trash"></use></svg>
                            </button>
                        </div>`;
                } else if (video) {
                    s += `<div title="${safeFilename}" role="button" tabindex="0"
                            data-title="${safeTitle}" data-desc="${safeDesc}" data-alt="${safeAlt}" data-larger-url="${safeLargerUrl}">
                            <svg class="viditem" data-src="${src}" data-filename="${safeFilename}">
                            <use xlink:href="#ion-ios-film-outline"></use>
                            </svg>
                            <span>${thumbName}</span>
                            <button title="Remove" data-lang-title>
                            <svg class="is-icon-flex"><use xlink:href="#icon-trash"></use></svg>
                            </button>
                        </div>`;
                }
            });
            const divImageList = document.querySelector('#imageList');
            divImageList.insertAdjacentHTML('beforeend', s);

            var settings = getSettings();
            if (settings != 'undefined') {
                var json = JSON.parse(settings);
                document.querySelector("#inpTheme").value = json.theme;
                document.querySelector("#inpHover").value = json.hover;
                document.querySelector("#inpSlideEffect").value = json.slideEffect;
                document.querySelector("#inpCaptionPos").value = json.captionPos;
                document.querySelector("#inpCaptionEffect").value = json.captionEffect;
                document.querySelector("#inpCaptionTheme").value = json.captionTheme;
                document.querySelector("#inpColumns").value = json.cols;
                document.querySelector("#inpGap").value = json.gap;
                document.querySelector("#inpRounded").value = json.rounded;
                document.querySelector("#inpZoomable").value = json.zoomable;
                document.querySelector("#inpLightbox").value = json.lightbox || '';
            }

            //---- base64 jandling for demo purpose ----
            function mimeToExt(mime) {
                const map = {
                    'image/png': 'png',
                    'image/jpeg': 'jpg',
                    'image/jpg': 'jpg',
                    'image/gif': 'gif',
                    'image/webp': 'webp',
                    'audio/mpeg': 'mp3',
                    'audio/mp3': 'mp3',
                    'audio/wav': 'wav',
                    'video/mp4': 'mp4',
                    'video/webm': 'webm'
                };
                return map[mime.toLowerCase()] || 'bin';
            }
            function generateFilenameFromBase64(base64) {
                if (!base64.startsWith('data:')) return '';

                const mime = base64.split(';')[0].slice(5); // e.g., "image/png"
                const ext = mimeToExt(mime);
                return makeid() + '.' + ext;
            }
            //---- base64 jandling for demo purpose ----

            function addMedia(s, name) {
                var filename = s.substring(s.lastIndexOf('/')+1); 
                if(name) filename = name;

                if (s.startsWith('data:')) {
                    filename = generateFilenameFromBase64(s); // base64 handling
                }

                var extension = filename.split('.').pop();
                extension = extension.toLowerCase();
                var imageList = document.querySelector('#imageList');
                if(extension==='mp4') {
                    imageList.insertAdjacentHTML('beforeend', `<div title="${filename}" role="button">
                        <svg class="viditem" data-src="${s}" data-filename="${filename}"><use xlink:href="#ion-ios-film-outline"></use></svg>
                        <span>${filename.trimEllip(15)}</span>
                        <button title="Remove" data-lang-title><svg class="is-icon-flex"><use xlink:href="#icon-trash"></use></svg></button>
                    </div>`);
                } else {
                    imageList.insertAdjacentHTML('beforeend', `<div title="${filename}" role="button">
                        <img src="${s}" data-filename="${filename}" />
                        <span>${filename.trimEllip(55)}</span>
                        <button title="Remove" data-lang-title><svg class="is-icon-flex"><use xlink:href="#icon-trash"></use></svg></button>
                    </div>`);
                }
                applyBehaviour();
            }
            var btnAddImage = document.querySelector('.input-slider-image');
            btnAddImage.addEventListener('click', function() {
                parent._cb.openMediaPicker('', 'media', function(s){
                    if(s==='') return;
                    addMedia(s);
                });
            });
            var btnSelectAsset = document.querySelector('.input-select');
            parent._cb.renderSelectAsset(btnSelectAsset, 'media', (s)=>{
                addMedia(s);
            });
            if (!parent._cb.onImageSelectClick && parent._cb.imageselect==='' ) {
                btnSelectAsset.style.display = 'none';
            }

            function addLarger(s) {
                const inpLargerURL = document.querySelector('#inpLargerURL');
                inpLargerURL.value = s;
                var item = document.querySelector('#imageList div.active');
                item.setAttribute('data-larger-url', encodeURIComponent(s));
            }
            var btnAddImage = document.querySelector('.input-larger');
            btnAddImage.addEventListener('click', function() {
                parent._cb.openMediaPicker('', 'media', function(s){
                    if(s==='') return;
                    addLarger(s);
                });
            });
            var btnSelectAsset = document.querySelector('.input-select-larger');
            parent._cb.renderSelectAsset(btnSelectAsset, 'media', (s)=>{
                addLarger(s);
            });
            if (!parent._cb.onImageSelectClick && parent._cb.imageselect==='' ) {
                btnSelectAsset.style.display = 'none';
            }
            // -----

            var btnCaptionPanelClose = document.querySelector('.btn-caption-close');
            if(btnCaptionPanelClose) btnCaptionPanelClose.addEventListener('click', function() {
                closeCaptionPanel();
            });

            var inpUrl = document.querySelector('#inpURL');
            inpUrl.addEventListener('change', function(e){
                var item = document.querySelector('#imageList div.active');

                let s = inpUrl.value;
                let filename = s.substring(s.lastIndexOf('/')+1); 
                let extension = filename.split('.').pop();
                extension = extension.toLowerCase();

                if(extension==='mp4') {
                    const img = item.querySelector('img');
                    if(img) {
                        img.outerHTML = `<svg class="viditem" data-src="${s}"><use xlink:href="#ion-ios-film-outline"></use></svg>`;
                    }
                    const vid = item.querySelector('.viditem');
                    if(vid) {
                        vid.outerHTML = `<svg class="viditem" data-src="${s}"><use xlink:href="#ion-ios-film-outline"></use></svg>`;
                    }

                    let filename = s.substring(inpUrl.value.lastIndexOf('/')+1); 
                    item.querySelector('span').innerHTML = filename.trimEllip(15);
                } else {
                    const img = item.querySelector('img');
                    if(img) {
                        img.outerHTML = `<img src="${s}" />`;
                    }
                    const vid = item.querySelector('.viditem');
                    if(vid) {
                        vid.outerHTML = `<img src="${s}" />`;
                    }

                    let filename = s.substring(s.lastIndexOf('/')+1); 
                    item.querySelector('span').innerHTML = filename.trimEllip(15);
                }

            });

            var btnDeleteSlide = document.querySelector('.delete-slide');
            if(btnDeleteSlide) btnDeleteSlide.addEventListener('click', function() {
                var item = document.querySelector('#imageList div.active');
                item.parentNode.removeChild(item);
                closeCaptionPanel();
            });

            document.querySelector('#inpTitle').addEventListener('input', function(e){
                var item = document.querySelector('#imageList div.active');
                item.setAttribute('data-title', encodeURIComponent(document.querySelector('#inpTitle').value));
            });

            document.querySelector('#inpDesc').addEventListener('input', function(e){
                var item = document.querySelector('#imageList div.active');
                item.setAttribute('data-desc', encodeURIComponent(document.querySelector('#inpDesc').value));
            });

            document.querySelector('#inpAlt').addEventListener('input', function(e){
                var item = document.querySelector('#imageList div.active');
                item.setAttribute('data-alt', encodeURIComponent(document.querySelector('#inpAlt').value));
            });

            document.querySelector('#inpLargerURL').addEventListener('input', function(e){
                var item = document.querySelector('#imageList div.active');
                item.setAttribute('data-larger-url', encodeURIComponent(document.querySelector('#inpLargerURL').value));
            });

            applyBehaviour();

            var sortable = new Sortable(document.querySelector('#imageList'), {
                animation: 400, 
                easing: "cubic-bezier(1, 0, 0, 1)", 
                scroll: true,
            });
        });

        function closeCaptionPanel() {
            const divCaption = document.querySelector('#divCaption');
            divCaption.style.right = '-400px';
            setTimeout(()=>{
                divCaption.style.display = 'none';
            },600);

            let item = document.querySelector('#imageList div.active');
            if(item) item.focus();

            var items = document.querySelectorAll('#imageList > div');
            Array.prototype.forEach.call(items, function(item){
                removeClass(item,'active');
            });
            document.body.focus();
        }

        function applyBehaviour() {

            var files = document.querySelectorAll('#imageList > div');
            files.forEach(function(item){

                item.addEventListener('keydown', function(e){
                    if(!e.target.closest('button')) {
                        if(e.keyCode === 13 || e.keyCode === 32) {
                            item.click();
                        }
                    }
                });

                item.addEventListener('click', function(e){
                    
                    if(e.target.closest('button')) {
                        var btn = e.target.closest('button');
                        const div = btn.parentNode;
                        div.parentNode.removeChild(div);
                        closeCaptionPanel();

                        e.preventDefault();
                        e.stopImmediatePropagation();
                        
                        return;
                    }

                    //Open
                    const divCaption = document.querySelector('#divCaption');
                    divCaption.style.display = 'block';
                    setTimeout(()=>{
                        divCaption.style.right = '0';
                    },10)
                    divCaption.focus();

                    var items = document.querySelectorAll('#imageList > div');
                    Array.prototype.forEach.call(items, function(item){
                        removeClass(item,'active');
                    });
                    addClass(item,'active');

                    const inpUrl = document.querySelector('#inpURL');
                    const img = item.querySelector('img');
                    let imgSrc;
                    if(img) {
                        imgSrc = img.getAttribute('src');
                        if(imgSrc.indexOf('base64')!==-1) {
                            inpUrl.value = 'image/jpeg (base64)';
                        } else {
                            inpUrl.value = imgSrc;
                        }
                    }
                    const vid = item.querySelector('.viditem');
                    let vidSrc;
                    if(vid) {
                        vidSrc = vid.getAttribute('data-src');
                        if(vidSrc.indexOf('base64')!==-1) {
                            inpUrl.value = 'video/mp4 (base64)';
                        } else {
                            inpUrl.value = vidSrc;
                        }
                    }

                    // const divLightbox = document.querySelector('.div-lightbox');
                    // if(vid) {
                    //     divLightbox.style.display = 'none';
                    // } else {
                    //     divLightbox.style.display = '';
                    // }

                    const inpLargerUrl = document.querySelector('#inpLargerURL');
                    let largerUrl = item.getAttribute('data-larger-url');
                    inpLargerUrl.value = largerUrl;

                    var title = '';
                    var titleAttr = item.getAttribute('data-title');

                    var desc = '';
                    var descAttr = item.getAttribute('data-desc');

                    var alt = '';
                    var altAttr = item.getAttribute('data-alt');

                    if(titleAttr) {
                      title = decodeURIComponent(titleAttr);
                    } 

                    if(descAttr) {
                        desc = decodeURIComponent(descAttr);
                    } 

                    if(altAttr) {
                        alt = decodeURIComponent(altAttr);
                    } 

                    document.querySelector('#inpTitle').value = title;
                    document.querySelector('#inpDesc').value = desc;
                    document.querySelector('#inpAlt').value = alt;

                    e.preventDefault();
                    e.stopImmediatePropagation();
                });
            });

            // var divCaption = document.querySelector('#divCaption');
            // if(divCaption.style.right < 0) {//Open
            //     divCaption.style.display = 'block';
            //     divCaption.style.right = '400px';
            // }
        }

        // -----
        function escapeHtml(str) {
            return String(str ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function construct() {

            var lazyLoading = false;
            
            var htmlImages = '';

            let lightbox = document.querySelector("#inpLightbox").value;

            var items = document.querySelectorAll('#imageList > div[role="button"]');
            items.forEach(function(item){

                const img = item.querySelector('img');
                const video = item.querySelector('.viditem');
                let src;
                if (img) {
                    src = img.getAttribute('src');
                } else if (video) {
                    src = video.getAttribute('data-src');
                }

                var filename = (img && img.getAttribute('data-filename')) || 
                                (video && video.getAttribute('data-filename')) || '';

                // Decode, then escape user-provided attributes
                const titleAttr = item.getAttribute('data-title');
                const descAttr = item.getAttribute('data-desc');
                const altAttr = item.getAttribute('data-alt');
                const largerUrlAttr = item.getAttribute('data-larger-url');

                const title = titleAttr ? escapeHtml(decodeURIComponent(titleAttr)) : '';
                const desc  = descAttr  ? escapeHtml(decodeURIComponent(descAttr))  : '';
                const alt   = altAttr   ? escapeHtml(decodeURIComponent(altAttr))   : '';
                let largerUrl = largerUrlAttr ? decodeURIComponent(largerUrlAttr) : '';
                if (!largerUrl) largerUrl = src;

                const enableLightbox = false; // (unused here, kept for reference)

                // Lazy loading case
                if (lazyLoading) {
                    if (img) {
                        htmlImages += `<div class="gallery-item">
                            <a href="${largerUrl}" class="glightbox" data-title="${title}" data-description="${desc}">
                            <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200'></svg>" 
                                data-src="${src}" alt="${alt}" data-filename="${escapeHtml(filename)}" class="lzy-img">
                            ${(title || desc) ? `
                                <div class="caption">
                                ${title ? `<h4>${title}</h4>` : ''}
                                ${desc ? `<div>${desc}</div>` : ''}
                                </div>` : ''}
                            </a>
                        </div>`;
                    } else if (video) {
                        htmlImages += `
                            <div class="gallery-item">
                            <video muted loop playsinline data-title="${title}" data-description="${desc}" 
                                    data-filename="${escapeHtml(filename)}" loading="lazy">
                                <source src="${src}#t=0.01" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                            <a href="${largerUrl}" class="glightbox gallery-video-overlay" data-title="${title}" data-description="${desc}"></a>
                            ${(title || desc) ? `
                                <div class="caption">
                                ${title ? `<h4>${title}</h4>` : ''}
                                ${desc ? `<div>${desc}</div>` : ''}
                                </div>` : ''}
                            </div>`;
                    }
                } else {
                    // Normal loading case
                    if (img) {
                        htmlImages += `<div class="gallery-item">
                            <a href="${largerUrl}" class="glightbox" data-title="${title}" data-description="${desc}">
                            <img src="${src}" alt="${alt}" data-filename="${escapeHtml(filename)}">
                            ${(title || desc) ? `
                                <div class="caption">
                                ${title ? `<h4>${title}</h4>` : ''}
                                ${desc ? `<div>${desc}</div>` : ''}
                                </div>` : ''}
                            </a>
                        </div>`;
                    } else if (video) {
                        htmlImages += `
                            <div class="gallery-item">
                            <video muted loop playsinline data-title="${title}" data-description="${desc}" 
                                    data-filename="${escapeHtml(filename)}">
                                <source src="${src}#t=0.01" type="video/mp4">
                                Your browser does not support the video tag.
                            </video>
                            <a href="${largerUrl}" class="glightbox gallery-video-overlay" data-title="${title}" data-description="${desc}"></a>
                            ${(title || desc) ? `
                                <div class="caption">
                                ${title ? `<h4>${title}</h4>` : ''}
                                ${desc ? `<div>${desc}</div>` : ''}
                                </div>` : ''}
                            </div>`;
                    }
                }

            });

            let gap = parseInt(document.querySelector("#inpGap").value);
            if(isNaN(gap)) gap = 0;

            let cols = parseInt(document.querySelector("#inpColumns").value);

            let theme = document.querySelector("#inpTheme").value;
            let hover = document.querySelector("#inpHover").value;
            let slide = document.querySelector("#inpSlideEffect").value;
            let captionPos = document.querySelector("#inpCaptionPos").value;
            let captionEffect = document.querySelector("#inpCaptionEffect").value;
            let captionTheme = document.querySelector("#inpCaptionTheme").value;
            let zoomable = document.querySelector("#inpZoomable").value;
            
            let rounded = parseInt(document.querySelector("#inpRounded").value);
            if(isNaN(rounded)) rounded = 0;
            
            let html = `
              <div id="_style_{id}" style="display:none">
                #{id}.is-media-grid {
                  column-count: ${cols};
                  column-gap: ${gap}px;
                  padding: ${gap}px;
                }
                #{id} .gallery-item {
                  position: relative;
                  break-inside: avoid;
                  border-radius: ${rounded}px;
                  margin-bottom: ${gap}px;
                  line-height: 0; /* Eliminate extra space */
                  overflow: hidden;
                    /* box-shadow: 5px 5px 0px #00000012;*/
                }
                #{id} .gallery-item img {
                  width: 100%;
                  height: auto;
                  transition: .8s all;
                }
                #{id} .gallery-item .caption {
                  position: absolute;
                  bottom: 0;
                  left: 0;
                  width: 100%;
                  background-color: rgba(0, 0, 0, 0.4);
                  color: #fff;
                  padding: 12px 15px;
                  opacity: 0;
                  transition: all 0.8s ease;
                  overflow: hidden;
                  text-overflow: ellipsis;
                  box-sizing: border-box;
                  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
                  font-size: .9em;
                  font-weight: 200;
                  line-height: 1.2;
                }
                
                #{id} .gallery-item .caption h4 {
                  font-weight: 300;
                  font-size: 1.1em;
                  margin: 0 0 0.1em;;
                }
                #{id} .gallery-item:hover .caption {
                  opacity: 1;
                }

                ${hover==='fade'? `
                #{id}.is-media-grid:hover img { opacity: 0.7; }
                #{id}.is-media-grid img:hover { opacity: 1; }
                `:''}

                ${hover==='pulse'? `
                #{id} .gallery-item:hover {
                    animation: zoomOutZoomIn 1s ease forwards;
                }
                @keyframes zoomOutZoomIn {
                    0% { transform: scale(1); }
                    50% { transform: scale(0.97); }
                    100% { transform: scale(1); }
                }
                `:''}

                ${hover==='zoomslow'? `
                #{id} .gallery-item img {
                    transform-origin: center;
                    transition: transform 5s ease, opacity 0.5s ease;
                }
                #{id} .gallery-item:hover img {
                    transform: scale(1.1);
                }
                `:''}

                ${hover==='zoomfast'? `
                #{id} .gallery-item img {
                    transform-origin: center;
                    transition: transform 0.4s ease, opacity 0.5s ease;
                }
                #{id} .gallery-item:hover img {
                    transform: scale(1.04);
                }
                `:''}

                ${hover==='bounce'? `
                #{id} .gallery-item:hover {
                    animation: bounce 1s;
                }
                @keyframes bounce {
                    0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
                    40% {transform: translateY(-30px);}
                    60% {transform: translateY(-15px);}
                }
                `:''}

                ${hover==='color'? `
                #{id} .gallery-item img {
                    filter: grayscale(100%);
                    transition: filter 0.5s ease;
                }
                #{id} .gallery-item img:hover {
                    filter: grayscale(0%);
                }
                `:''}

                ${captionEffect==='slide'? `
                #{id} .gallery-item .caption {
                    transform: translateY(100%);
                    transition: transform 0.5s ease, opacity 0.5s ease;
                }
                #{id} .gallery-item:hover .caption {
                    transform: translateY(0%);
                    opacity: 1;
                } 
                `:''}

                ${captionEffect==='floatingfade'? `
                #{id} .gallery-item .caption {
                    border-radius: ${rounded}px;
                    transition: transform 0.5s ease,opacity 0.5s ease;
                    width: unset;
                    left: 10px; right: 10px; bottom: 10px;
                }
                `:''}
                
                ${captionEffect==='floatingslide'? `
                #{id} .gallery-item .caption {
                    border-radius: ${rounded}px;
                    transform: translateY(150%);
                    transition: transform 0.5s ease;
                    opacity: 1;
                    width: unset;
                    left: 10px; right: 10px; bottom: 10px;
                }
                #{id} .gallery-item:hover .caption {
                    transform: translateY(0%);
                } 
                `:''}
                    
                ${captionTheme==='light'?`
                #{id} .gallery-item .caption {
                    background-color: #fff;
                    color: #000;
                }
                #{id} .gallery-item .caption * {
                    color: #000;
                }
                `:`
                #{id} .gallery-item .caption {
                    background-color: rgba(0, 0, 0, 0.4);
                    color: #fff;
                }
                #{id} .gallery-item .caption * {
                    color: #fff;
                }
                `}

                ${lightbox===''?'':`
                #{id} .gallery-item a.glightbox {
                    pointer-events: none;
                }
                `}

                @media (max-width: 800px) {
                  #{id}.is-media-grid {column-count: ${Math.min(3,cols)};}
                }
                @media (max-width: 600px) {
                  #{id}.is-media-grid {column-count: ${Math.min(2,cols)};}
                }
                /*
                @media (max-width: 400px) {
                  #{id}.is-media-grid {column-count: 1;}
                }
                */

                .gallery-item .gallery-video-overlay {
                    width: 100%;
                    height: 100%;
                    position: absolute;
                    top: 0; left: 0;
                    background: rgba(255,255,255,0.000001);
                }
                .gallery-item video {
                    height: auto; 
                    width: 100%;
                    object-fit: cover;
                }

                .lzy-img {
                    opacity: 0;
                    transition: opacity 0.5s ease-in;
                }
                .lzy-img.loaded {
                    opacity: 1;
                }
                </div>
                <div id="{id}" class="is-media-grid grid-sortable cols-${cols}" style="opacity:0">
                  ${htmlImages}
                </div>
                <scr`+`ipt>
                var docReady = function(fn) {
                    var stateCheck = setInterval(function() {
                        if (document.readyState !== "complete") return;
                        clearInterval(stateCheck);
                        fn();
                    }, 1);
                };

                docReady(function() {
                  var cssElm = document.querySelector('#_style_{id}');
                  if(!cssElm) return;
                  var css = cssElm.innerHTML;
                  var head = document.getElementsByTagName('head')[0];
                  var s = document.createElement('style');
                  s.appendChild(document.createTextNode(css));
                  head.appendChild(s);

                  var grid = document.getElementById('{id}');

                    var imageObserver = new IntersectionObserver((entries, imgObserver) => {
                        entries.forEach((entry) => {
                            if (entry.isIntersecting) {
                                const lazyImage = entry.target;
                                lazyImage.src = lazyImage.dataset.src;

                                lazyImage.addEventListener('load', () => {
                                    lazyImage.classList.add('loaded');
                                }, { once: true });

                                lazyImage.classList.remove('lzy-img');
                                imgObserver.unobserve(lazyImage);
                            }
                        })
                    });
                    const arr = grid.querySelectorAll('img.lzy-img')
                    arr.forEach((v) => {
                        imageObserver.observe(v);
                    });
              
                    const enableLightbox = ${lightbox===''?true:false};
                    if(enableLightbox) {
                        if (typeof GLightbox === 'undefined') {

                            if (!document.querySelector('link[href*="glightbox.min.css"]')) {
                                var lightboxCss = document.createElement('link');
                                lightboxCss.href = 'https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/css/glightbox.min.css';
                                lightboxCss.rel = 'stylesheet';
                                document.head.appendChild(lightboxCss);
                            }

                            if (!document.querySelector('script[src*="glightbox.min.js"]')) {
                                var lightboxJs = document.createElement('script');
                                lightboxJs.src = 'https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.2.0/js/glightbox.min.js';
                                lightboxJs.onload = function() {
                                    initLightbox();
                                };
                                document.head.appendChild(lightboxJs);
                            }
                                
                        } else {
                            initLightbox();
                        }
                    } else {
                        grid.style.opacity = '';
                    }

                    const items = grid.querySelectorAll('.gallery-item');
                    const vids = grid.querySelectorAll('.gallery-item video');
                    let n = 0;
                    items.forEach((item)=>{
                        if(!item.querySelector('video')) return;
                        let video = vids[n];
                        item.addEventListener('mouseover', ()=>{
                            video.play();
                        }, false);
                    
                        item.addEventListener('mouseout', ()=>{
                            video.pause();
                        }, false);
                        n++;
                    });

                    if(window.innerWidth < 980) {
                        window.addEventListener('scroll', function() {
                            const videos = grid.querySelectorAll('.gallery-item video');
                            videos.forEach((video)=>{
                                if (isInViewport(video, 0)) {
                                    video.play();
                                } else {
                                    video.pause();
                                }
                            });
                        });
                    }
                    function isInViewport(element, tolerance) {
                        var rect = element.getBoundingClientRect();
                        return (
                            rect.top >= 0 - tolerance &&
                            rect.bottom <= window.innerHeight + tolerance
                        );
                    }
                    function initLightbox() {

                        const lightbox = GLightbox({
                                touchNavigation: true,
                                selector: '#{id} .glightbox',
                                loop: true,
                                autoplayVideos: true,
                                zoomable: ${zoomable==='yes'?true:false},
                                slideEffect: '${slide}',
                                descPosition: '${captionPos}',
                                skin: '${theme?theme:'clean'}'
                        });

                        grid.style.opacity = '';
                            setTimeout(()=>{
                            grid.style.opacity = '';
                            }, 100);
                    }
              
                });

                </scr`+`ipt>
            `;

            // After generate the html, put the html on the snippet by calling setHtml() method. This will render the content.
            setHtml(html);

            var settings = {
                "gap": (document.querySelector("#inpGap").value===''?0:document.querySelector("#inpGap").value),
                "cols": document.querySelector("#inpColumns").value,
                "rounded": (document.querySelector("#inpRounded").value===''?0:document.querySelector("#inpRounded").value),
                "theme": document.querySelector("#inpTheme").value,
                "hover": document.querySelector("#inpHover").value,
                "captionPos": document.querySelector("#inpCaptionPos").value,
                "captionEffect": document.querySelector("#inpCaptionEffect").value,
                "captionTheme": document.querySelector("#inpCaptionTheme").value,
                "slideEffect": document.querySelector("#inpSlideEffect").value,
                "zoomable": document.querySelector("#inpZoomable").value,
                "lightbox": document.querySelector("#inpLightbox").value
            }
            setSettings(JSON.stringify(settings));
        }

       
        /* 
        COMMON METHODS FOR MODULE.
        */
        function getHtml() {
            var activeModule = parent._cb.doc.querySelector('[data-module-active]');
            return decodeURIComponent(activeModule.getAttribute('data-html'));
        }

        function getSettings() {
            var activeModule = parent._cb.doc.querySelector('[data-module-active]');
            return decodeURIComponent(activeModule.getAttribute('data-settings'));
        }

        function setHtml(html) {
            parent.document.querySelector('#hidModuleCode').value = html;
        }

        function setSettings(settings) {
            parent.document.querySelector('#hidModuleSettings').value = settings;
        }

        function makeid() {
            var text = '';
            var possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
            for (var i = 0; i < 2; i++)
                text += possible.charAt(Math.floor(Math.random() * possible.length));

            var text2 = '';
            var possible2 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            for (var i = 0; i < 5; i++)
                text2 += possible2.charAt(Math.floor(Math.random() * possible2.length));

            return text + text2;
        }


        function addClass(element, classname) {
            if(!element) return;
            if(hasClass(element,classname)) return;
            if(element.classList.length===0) element.className = classname;
            else element.className = element.className + ' ' + classname;
            element.className = element.className.replace(/  +/g, ' ');
        }

        function hasClass(element, classname) {
            if(!element) return false;
            return element.classList ? element.classList.contains(classname) : new RegExp('\\b'+ classname+'\\b').test(element.className);
        }

        function removeClass(element, classname) {
            if(!element) return;
            if(element.classList.length>0) {
                element.className = element.className.replace(classname, '');
            }
        }

        // https://stackoverflow.com/questions/7295843/allow-only-numbers-to-be-typed-in-a-textbox
        function isNumber(evt) {
            evt = (evt) ? evt : window.event;
            var charCode = (evt.which) ? evt.which : evt.keyCode;
            if (charCode > 31 && (charCode < 48 || charCode > 57)) {
                return false;
            }
            return true;
        }
        
        // Style stuff
        function applyParentStyles() {
            var cssString = `
                body {
                    color: ${parent._cb.styleModalColor};
                }
                
                button {
                    background-color: ${parent._cb.styleButtonClassicBackground};
                    color: ${parent._cb.styleButtonClassicColor};         
                }
                button svg {
                    fill: ${parent._cb.styleButtonClassicColor};         
                }

                input[type="text"],
                textarea {
                    color: ${parent._cb.styleInputColor};
                    background-color: ${parent._cb.styleInputBackground};
                    border-bottom: ${parent._cb.styleInputBorderBottom};
                }
                input:focus,
                textarea:focus {
                    outline: none;
                }
                select {
                    color: ${parent._cb.styleSelectColor};
                    background-color: ${parent._cb.styleSelectBackground};
                }
                select option {
                    background-color: ${parent._cb.styleSelectOptionBackground};
                }
                #divCaption {
                    background-color: ${parent._cb.styleModalBackground};
                }

                a:focus-visible,
                button:focus-visible,
                select:focus-visible,
                input:focus-visible,
                textarea:focus-visible {
                    outline:  ${parent._cb.styleOutlineColor} 2px solid;
                }
                #imageList > div.active,
                #imageList > div:focus-visible {
                    outline:  ${parent._cb.styleOutlineColor} 2px solid;
                    outline-offset: 2px;
                }

                #imageList div button {
                    background-color: ${parent._cb.styleOutlineColor};
                } 
            `;
            var style = document.createElement("style");
            style.type = "text/css";
            style.innerHTML = cssString;
            document.getElementsByTagName("head")[0].appendChild(style);
        }

        applyParentStyles();
        
        // Language file stuff
        function applyLang() {
            let elms = document.querySelectorAll('[data-lang]');
            elms.forEach(function(elm){
                elm.innerHTML = parent._cb.out(elm.innerHTML);
            });

            elms = document.querySelectorAll('[data-lang-title]');
            elms.forEach(function(elm){
                elm.setAttribute('title', parent._cb.out(elm.getAttribute('title')));
            });
        }
        applyLang();

        document.body.style.opacity = 1;

    class FileUploader {
        constructor(options = {}) {
            const defaults = {
                element: null,
                uploadUrl: '/upload',
                onUpload: null,
                sync: true,
                headers: {},
                allowedExtensions: ['jpg', 'png', 'pdf', 'docx'],
                blockedExtensions: ['exe', 'bat', 'sh'],
                maxFileSize: 100 * 1024 * 1024, // 100 MB
                onUploadSuccess: (res) => {},
                onFileUploaded: (file, res) => {},
                onUploadError: (err) => {}
            };

            this.settings = Object.assign({}, defaults, options);

            if (!this.settings.element) {
                throw new Error("Element must be provided");
            }

            this.totalFiles = 0;
            this.completedFiles = 0;

            this.init();
        }

        init() {
            this.createElementStructure();
            this.attachEventListeners();
        }

        createElementStructure() {
            const el = this.settings.element;
            el.classList.add('file-uploader');
            el.setAttribute('role', 'button');
            el.setAttribute('tabindex', '0');

            this.dropZone = el;

            this.fileInput = document.createElement('input');
            this.fileInput.type = 'file';
            this.fileInput.multiple = true;
            this.fileInput.style.display = 'none';
            el.appendChild(this.fileInput);

            // Only one UI element: progress bar
            this.progressBar = document.createElement('progress');
            this.progressBar.className = 'upload-progress';
            this.progressBar.style.display = 'none'; // Hidden by default
            this.progressBar.value = 0;
            this.progressBar.max = 100;
            el.appendChild(this.progressBar);
        }

        attachEventListeners() {
            const el = this.dropZone;

            // el.addEventListener('click', () => {
            //   this.fileInput.click();
            // });

            this.fileInput.addEventListener('change', () => {
                this.handleFiles(this.fileInput.files);
            });
            
            el.addEventListener('dragover', (e) => {
                e.preventDefault();

                // Only add 'dragover' if actual files are being dragged in
                if (e.dataTransfer.types.includes('Files')) {
                    el.classList.add('dragover');
                }
            });

            el.addEventListener('dragleave', (e) => {
                // Optional: improve accuracy by checking relatedTarget
                if (!el.contains(e.relatedTarget)) {
                    el.classList.remove('dragover');
                }
            });

            el.addEventListener('drop', (e) => {
                e.preventDefault();
                el.classList.remove('dragover');

                // Only process drops that contain files
                if (e.dataTransfer.files.length > 0) {
                    this.handleFiles(e.dataTransfer.files);
                }
            });
        }

        async handleFiles(files) {
            const validFiles = Array.from(files).filter(file => this.isFileAllowed(file));
            if (validFiles.length === 0) return;

            this.totalFiles = validFiles.length;
            this.completedFiles = 0;

            // Show and reset progress bar
            this.progressBar.style.display = 'block';
            this.progressBar.value = 0;

            if(this.settings.sync) {
                for (let i = 0; i < validFiles.length; i++) {
                    await this.uploadSingleFile(validFiles[i]);
                }
            } else {
                validFiles.forEach(file => this.uploadSingleFile(file));
            }
        }

        isFileAllowed(file) {
            const fileName = file.name.toLowerCase();
            const fileExt = fileName.split('.').pop() || '';

            if (!fileExt) return false;

            if (this.settings.blockedExtensions.includes(fileExt)) return false;
            if (!this.settings.allowedExtensions.includes(fileExt)) return false;
            if (file.size > this.settings.maxFileSize) return false;

            return true;
        }

        async uploadSingleFile(file) {
            const { uploadUrl, onUpload, onUploadSuccess, onUploadError, onFileUploaded } = this.settings;

            try {
                let result;

                if (typeof onUpload === 'function') {
                    // Use custom upload function
                    result = await onUpload(file);
                } else {
                    // Fallback to default fetch-based upload
                    const formData = new FormData();
                    formData.append('file', file);

                    let headers =  {
                        ...this.settings.headers,
                    };
                    const response = await fetch(uploadUrl, {
                        method: 'POST',
                        headers,
                        body: formData
                    });

                    if (!response.ok) throw new Error('Upload failed');
                    result = await response.json();
                }

                // Update progress
                this.completedFiles++;
                const percent = Math.round((this.completedFiles / this.totalFiles) * 100);
                this.progressBar.value = percent;

                // Trigger callbacks
                if (typeof onFileUploaded === 'function') {
                    onFileUploaded(file, result);
                }

                if (typeof onUploadSuccess === 'function') {
                    onUploadSuccess(result);
                }

                if (this.completedFiles === this.totalFiles) {
                    setTimeout(() => {
                        this.progressBar.style.display = 'none';
                        this.progressBar.value = 0;
                    }, 300);
                }

            } catch (error) {
                console.error("Upload error:", error);
                onUploadError(error);

                // Hide progress bar on error
                setTimeout(() => {
                    this.progressBar.style.display = 'none';
                    this.progressBar.value = 0;
                }, 300);
            }
        }

    }
    </script>
