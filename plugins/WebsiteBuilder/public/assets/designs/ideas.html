<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Widget Browser</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-color: #0078ff;
            --bg-color: #f9f9f9;
            --card-bg: #ffffff;
            --text-main: #333;
            --text-muted: #777;
            --border-color: #e1e1e1;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            width: var(--sidebar-width);
            background: #fff;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px 20px 10px 20px;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px 10px 35px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #f5f5f5;
            font-size: 14px;
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            width: 16px;
            height: 16px;
        }

        .template-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }

        .sidebar-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 10px 0 10px 5px;
        }

        .template-btn {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 4px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            color: var(--text-main);
            position: relative;
        }

        .template-btn:hover {
            background: #f0f0f0;
        }

        .template-btn.active {
            background: #e6f2ff;
            color: var(--primary-color);
            font-weight: 600;
        }

        .item-count {
            margin-left: auto;
            background: rgba(0, 0, 0, 0.05);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .template-btn.active .item-count {
            background: rgba(0, 120, 255, 0.1);
            color: var(--primary-color);
        }

        /* Sidebar Buy Hover */
        .template-btn.is-paid .buy-overlay {
            display: none;
            margin-left: auto;
            align-items: center;
            gap: 6px;
        }

        .template-btn.is-paid:hover .item-count {
            display: none;
        }

        .template-btn.is-paid:hover .buy-overlay {
            display: flex;
        }

        .buy-badge {
            background: var(--text-main);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: 0 30px 30px 30px;
            display: flex;
            flex-direction: column;
        }

        .content-header {
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding: 30px 0 20px 0;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-title {
            font-size: 20px;
            font-weight: 600;
            margin: 0;
        }

        .content-meta {
            font-size: 13px;
            color: var(--text-muted);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 10px 5px 40px 5px;
        }

        /* --- Simple Section Card --- */
        .section-card {
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            cursor: pointer;
            position: relative;
            aspect-ratio: 16/10;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
            will-change: transform;
            /* Optimalisasi performa animasi */
        }

        .section-card:hover {
            transform: translateY(-6px);
            /* Sedikit lebih tinggi untuk efek depth */
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.12);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Hover Name Tag - Small top right */
        .section-name-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.95);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.2s ease;
            z-index: 10;
            white-space: nowrap;
        }

        .section-card:hover .section-name-tag {
            opacity: 1;
            transform: translateY(0);
        }

        /* Lock Overlay */
        .lock-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 5;
        }

        .section-card.locked:hover .lock-overlay {
            opacity: 1;
        }

        .lock-circle {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transform: scale(0.9);
            transition: transform 0.2s;
        }

        .section-card.locked:hover .lock-circle {
            transform: scale(1);
        }

        /* States */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 120, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s infinite linear;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="search-container">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Search Widgets...">
                <div id="searchResults"
                    style="display: none; position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: var(--card-bg); border: 1px solid var(--border-color); box-shadow: 0 8px 24px rgba(12, 24, 48, 0.08); border-radius: 10px; max-height: 240px; overflow-y: auto; z-index: 50; padding: 6px;">
                    No results found.
                </div>
            </div>
        </div>
        <div class="template-list-container">
            <div class="sidebar-label">Widgets</div>
            <ul id="templateList" style="padding: 0; list-style: none; margin: 0;"></ul>
        </div>
    </aside>

    <main class="main-content">
        <div class="content-header">
            <h2 class="content-title" id="activeTemplateTitle">All Widgets</h2>
            <div class="content-meta">
                Total <strong id="sectionCount">0</strong> items
            </div>
        </div>

        <div id="sectionGrid" class="grid-container"></div>

        <div id="loadingIndicator" class="loading-state">
            <div class="spinner"></div>
            <p style="font-size: 14px;">Memuat...</p>
        </div>
    </main>

    <!-- Modal Pembelian -->
    <div id="modalOverlay"
        style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center;">
        <div
            style="background: white; padding: 30px; border-radius: 12px; max-width: 380px; width: 90%; text-align: center;">
            <div
                style="width: 56px; height: 56px; background: #e6f2ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h3 style="margin: 0 0 10px 0;">Premium Widget</h3>
            <p style="color: #666; font-size: 14px; margin-bottom: 25px;">This widget is part of the premium Widget
                Collection.
                Purchase now to use all of its features.</p>
            <div style="display: flex; gap: 10px;">
                <button onclick="document.getElementById('modalOverlay').style.display='none'"
                    style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer;">Cancel</button>
                <button onclick="alert('Redirecting to payment...')"
                    style="flex: 1; padding: 12px; border: none; border-radius: 8px; background: var(--primary-color); color: white; cursor: pointer; font-weight: 600;">Buy
                    Now</button>
            </div>
        </div>
    </div>

    <script>
        let templatesData = [];
        if (window.parent && parent.contentbox) {
            templatesData = parent.contentbox.templates;
        }
        const defaultHeaders = parent.contentbox.defaultHeaders;

        let state = { activeTemplateId: templatesData.length > 0 ? templatesData[0].id : 1, searchQuery: '' };

        const els = {
            templateList: document.getElementById('templateList'),
            sectionGrid: document.getElementById('sectionGrid'),
            searchInput: document.getElementById('searchInput'),
            activeTitle: document.getElementById('activeTemplateTitle'),
            sectionCount: document.getElementById('sectionCount'),
            loading: document.getElementById('loadingIndicator'),
            modal: document.getElementById('modalOverlay'),
            searchResult: document.getElementById('searchResults'),
        };

        function renderSidebar() {
            els.templateList.innerHTML = '';

            templatesData.forEach(tpl => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.className = `template-btn ${tpl.id === state.activeTemplateId ? 'active' : ''} ${tpl.is_paid ? 'is-paid' : ''}`;
                btn.onclick = () => {
                    if (state.activeTemplateId === tpl.id) return;
                    state.activeTemplateId = tpl.id;
                    renderSidebar();
                    renderGrid();
                };

                const hoverContent = tpl.is_paid ? `<div class="buy-overlay"><span class="buy-badge">BUY</span></div>` : '';
                btn.innerHTML = `<span>${tpl.name}</span><span class="item-count">${tpl.section_count}</span>${hoverContent}`;
                li.appendChild(btn);
                els.templateList.appendChild(li);
            });
        }

        // Fetch sections (each section has a `url` to load HTML/content)
        async function fetchSections() {
            const target = templatesData.find(t => t.id === state.activeTemplateId) || { sections: [], is_paid: false, name: '' };

            if (Array.isArray(target.sections)) {
                return target.sections.map(section => ({
                    id: section.id,
                    name: section.name,
                    thumbnail: section.thumbnail,
                    isLocked: target.is_paid,
                    html: section.html,
                    section_css: section.section_css,
                    main_css: section.main_css
                }));
            }

            const res = await fetch(target.sections, {
                headers: defaultHeaders
            });
            const data = await res.json();
            if (data.sections.length === 0) {
                return [];
            }
            return data.sections.map(section => ({
                id: section.id,
                name: section.name,
                thumbnail: section.thumbnail,
                isLocked: target.is_paid,
                html: section.html,
                section_css: section.section_css,
                main_css: section.main_css
            }));
        }

        async function renderGrid() {
            // Tampilkan loading screen
            els.sectionGrid.style.display = 'none';
            els.loading.style.display = 'flex';

            const activeTpl = templatesData.find(t => t.id === state.activeTemplateId);

            els.activeTitle.textContent = activeTpl.name;

            // Fetch data
            const sections = await fetchSections();

            if (sections.length === 0) {
                els.loading.innerHTML = '<p style="color: var(--text-muted); font-size: 14px;">No widgets found in this Widget Collection.</p>';
                els.sectionCount.textContent = '0';
                return;
            }

            // Filter berdasarkan search
            const filtered = sections.filter(s =>
                s.name.toLowerCase().includes(state.searchQuery.toLowerCase())
                //  || s.tName.toLowerCase().includes(state.searchQuery.toLowerCase())
            );

            els.sectionCount.textContent = filtered.length;

            // Render ke UI
            els.loading.style.display = 'none';
            els.sectionGrid.style.display = 'grid';
            els.sectionGrid.innerHTML = '';

            filtered.forEach(section => {
                const card = document.createElement('div');
                card.className = `section-card ${section.isLocked ? 'locked' : ''}`;
                card.id = `section-card-${section.id}`;
                card.onclick = () => {
                    if (section.isLocked) {
                        els.modal.style.display = 'flex';
                        return;
                    }
                    parent.contentbox.addIdea(section.html)
                    parent.dispatchEvent(new CustomEvent('load-plugin'));
                };

                const lockIcon = `
                    <div class="lock-overlay">
                        <div class="lock-circle">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                        </div>
                    </div>
                `;

                card.innerHTML = `
                    <div class="section-name-tag">${section.name}</div>
                    ${section.isLocked ? lockIcon : ''}
                    <img class="card-image" src="${section.thumbnail}" alt="${section.name}" onerror="this.src='https://via.placeholder.com/400x250?text=No+Image'">
                `;
                els.sectionGrid.appendChild(card);
            });
        }

        async function searchTemplateData(query) {
            const q = query.toLowerCase();
            return templatesData.reduce((acc, item) => {
                const nameMatch = item.name && item.name.toLowerCase().includes(q);
                const keywords = Array.isArray(item.section_keywords) ? item.section_keywords : [];
                const matchedKeyword = keywords.find(kw => kw.name && kw.name.toLowerCase().includes(q));

                if (nameMatch || matchedKeyword) {
                    const id_section = matchedKeyword ? matchedKeyword.id : (keywords[0] ? keywords[0].id : null);
                    acc.push({
                        id_template: item.id,
                        id_section: id_section,
                        name_template: item.name
                    });
                }

                return acc;
            }, []);
        }

        function debounce(fn, wait = 300) {
            let timeout;
            return function (...args) {
                const ctx = this;
                clearTimeout(timeout);
                timeout = setTimeout(() => fn.apply(ctx, args), wait);
            };
        }

        const debouncedSearch = debounce(async (e) => {
            const query = e.target.value.trim();
            state.searchQuery = query;

            if (query.length === 0) {
                els.searchResult.style.display = 'none';
                // renderGrid();
                return;
            }

            els.searchResult.style.display = 'block';

            // Panggil API search
            const results = await searchTemplateData(query);

            // Render hasil pencarian di dropdown
            const resultsContainer = els.searchResult;
            resultsContainer.innerHTML = `
                <div style="display: flex; flex-direction: column; gap: 6px;">
                    ${results.map(item => `
                        <div class="search-item"
                            style="padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--text-main);"
                            onmouseover="this.style.background='#f5f7fb'"
                            onmouseout="this.style.background='transparent'"
                            onclick='(async function(){const it=${JSON.stringify(item)}; state.searchQuery=""; els.searchInput.value=""; els.searchResult.style.display="none"; if(it.html){ parent.contentbox.addIdea(it.html); return; } if(it.id_template){ state.activeTemplateId = Number(it.id_template); renderSidebar(); await renderGrid(); if(it.id_section){ const target = document.getElementById("section-card-"+it.id_section); if(target){ target.scrollIntoView({behavior:"smooth", block:"center", inline:"nearest"}); target.style.boxShadow = "0 12px 30px rgba(0,120,255,0.12)"; setTimeout(()=>{ target.style.boxShadow = ""; }, 1200); } } } })()'>${item.name_template}</div>
                    `).join('')}
                </div>
            `;
        }, 300);

        els.searchInput.addEventListener('input', debouncedSearch);

        window.onload = () => {
            renderSidebar();
            renderGrid();
        };
    </script>
</body>

</html>
